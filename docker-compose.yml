version: '3.8'

services:
  db:
    image: postgres:15
    container_name: price_transparency_db
    environment:
      POSTGRES_USER: ptuser
      POSTGRES_PASSWORD: ptpassword
      POSTGRES_DB: price_transparency
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
